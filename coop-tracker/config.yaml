name: "Coop Tracker"
version: "1.31.1"
slug: "coop-tracker"
description: "Log egg collection, coop cleaning, and feeding for your chickens"
url: "https://github.com/hoascv/homeassistant-addons/tree/main/coop-tracker"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: application
boot: auto
init: false
ingress: true
ingress_port: 8099
panel_icon: mdi:egg
panel_title: "Coop Tracker"
homeassistant_api: true
options:
  currency: "DKK"
  reminder_enabled: false
  reminder_check_time: "18:00"
  reminder_threshold_days: 2
  notify_service: ""
  ha_sensors_enabled: false
  flock_isabrown_count: 3
  flock_sussex_count: 2
  supermarket_egg_price: 2.5
  advanced_forecast_enabled: false
  egg_vision_enabled: false
  egg_vision_training_enabled: false
  egg_vision_training_retention_count: 200
schema:
  currency: "list(USD|EUR|GBP|DKK|SEK|NOK|CHF|CAD|AUD|JPY)"
  reminder_enabled: "bool"
  reminder_check_time: "str"
  reminder_threshold_days: "int(1,30)"
  notify_service: "str?"
  ha_sensors_enabled: "bool"
  flock_isabrown_count: "int(0,100)"
  flock_sussex_count: "int(0,100)"
  supermarket_egg_price: "float(0,100)"
  advanced_forecast_enabled: "bool"
  egg_vision_enabled: "bool"
  egg_vision_training_enabled: "bool"
  egg_vision_training_retention_count: "int(20,500)"
